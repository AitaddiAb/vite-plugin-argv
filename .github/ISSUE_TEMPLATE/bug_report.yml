name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you did and what happened instead
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior
      placeholder: |
        1. npm install vite-plugin-argv
        2. Set up vite.config.ts ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Node version, Vite version, OS, etc.
      placeholder: |
        - OS: macOS
        - Node: v20.0.0
        - Vite: v8.0.0
    validations:
      required: true
